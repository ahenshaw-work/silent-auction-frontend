---
schemaVersion: 2.2.0
metadata:
  name: silent-auction-frontend
components:
  - name: nodejs
    container:
      image: registry.redhat.io/devspaces/udi-rhel8:latest
      mountSources: true
      sourceMapping: /projects
      memoryLimit: 8G
      endpoints:
        - exposure: public
          name: nodejs
          protocol: https
          targetPort: 3000
      command:
        - sleep
        - infinity
commands:
  - exec:
      commandLine: npm install
      component: nodejs
      label: Install
      workingDir: '${PROJECTS_ROOT}/silent-auction-frontend'
    id: 1-install
  - exec:
      commandLine: npm run dev
      component: nodejs
      group:
        kind: run
      label: Start dev server
      workingDir: '${PROJECTS_ROOT}/silent-auction-frontend'
    id: 2-dev
